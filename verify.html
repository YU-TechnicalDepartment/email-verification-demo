<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>認証確認中…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { font-size: 14px; color: #9ca3af; margin-bottom: 20px; }
    .icon { font-size: 48px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">認証を確認しています…</h1>
    <p id="message">しばらくお待ちください。</p>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "YOUR_SUPABASE_URL",
      "YOUR_SUPABASE_ANON_KEY"
    );

    const icon = document.getElementById("icon");
    const title = document.getElementById("title");
    const message = document.getElementById("message");

    async function waitForSession() {
      for (let i = 0; i < 20; i++) {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) return user;
        await new Promise(r => setTimeout(r, 100));
      }
      return null;
    }

    async function init() {
      const user = await waitForSession();

      if (!user) {
        icon.textContent = "❌";
        title.textContent = "認証に失敗しました";
        message.textContent = "リンクが無効か、期限切れの可能性があります。";
        return;
      }

      icon.textContent = "✔";
      title.textContent = "認証が完了しました";
      message.textContent = `${user.email} としてログインしました。`;
    }

    init();
  </script>
</body>
</html>
