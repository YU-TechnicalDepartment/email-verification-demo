<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>4桁コードログイン - Step 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }
    p {
      font-size: 13px;
      color: #9ca3af;
      margin: 0 0 16px;
    }
    .code-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .code-row input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      border-radius: 12px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
    }
    .code-row input:focus {
      outline: 2px solid #38bdf8;
      border-color: #38bdf8;
    }
    button {
      margin-top: 8px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
      min-height: 16px;
    }
    .email-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>コードを入力</h1>
    <p>メールに届いた4桁のコードを入力してください。</p>

    <div class="email-label" id="email-label"></div>

    <div class="code-row">
      <input id="d1" maxlength="1" inputmode="numeric" />
      <input id="d2" maxlength="1" inputmode="numeric" />
      <input id="d3" maxlength="1" inputmode="numeric" />
      <input id="d4" maxlength="1" inputmode="numeric" />
    </div>

    <button id="verify">認証する</button>
    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "YOUR_SUPABASE_URL",
      "YOUR_SUPABASE_ANON_KEY"
    );

    const email = localStorage.getItem("email");
    const emailLabel = document.getElementById("email-label");
    const statusEl = document.getElementById("status");
    const verifyButton = document.getElementById("verify");

    if (email) {
      emailLabel.textContent = `送信先: ${email}`;
    } else {
      emailLabel.textContent = "メールアドレス情報が見つかりません。最初からやり直してください。";
      verifyButton.disabled = true;
    }

    const inputs = [
      document.getElementById("d1"),
      document.getElementById("d2"),
      document.getElementById("d3"),
      document.getElementById("d4")
    ];

    // 入力したら自動で次へフォーカス
    inputs.forEach((input, idx) => {
      input.addEventListener("input", () => {
        if (input.value && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && idx > 0) {
          inputs[idx - 1].focus();
        }
      });
    });

    verifyButton.onclick = async () => {
      if (!email) return;

      const code = inputs.map(i => i.value.trim()).join("");
      if (code.length !== 4) {
        statusEl.textContent = "4桁すべて入力してください。";
        return;
      }

      verifyButton.disabled = true;
      statusEl.textContent = "認証中…";

      const { data, error } = await supabase.auth.verifyOtp({
        email,
        token: code,
        type: "email"
      });

      if (error) {
        console.error(error);
        statusEl.textContent = "コードが違うか、有効期限が切れています。";
        verifyButton.disabled = false;
      } else {
        statusEl.textContent = "認証成功！";
        // ここで次のページに飛ばしたり、状態を保存したりできる
        // 例: window.location.href = "dashboard.html";
      }
    };
  </script>
</body>
</html>
