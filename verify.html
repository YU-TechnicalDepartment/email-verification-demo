<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>コード認証</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #1d2440 0, #050816 45%, #020617 100%);
      font-family: system-ui, sans-serif;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.9);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .code-box {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
    }
    .code-box input {
      width: 20%;
      padding: 14px;
      font-size: 22px;
      text-align: center;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.8);
      color: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }
    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }
    .success {
      color: #4ade80;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>認証コードを入力</h1>

    <div class="code-box">
      <input id="d1" maxlength="1" />
      <input id="d2" maxlength="1" />
      <input id="d3" maxlength="1" />
      <input id="d4" maxlength="1" />
    </div>

    <button onclick="verify()">認証する</button>

    <div id="error" class="error"></div>
    <div id="success" class="success">認証に成功しました！</div>
  </div>

  <script>
    const SUPABASE_URL = "https://opttdyvobpfqfyrmrjhm.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_tdGdBXYKcAf0LMa0Httq0g_KDZqkvu0";

    const inputs = ["d1", "d2", "d3", "d4"].map(id => document.getElementById(id));

    inputs.forEach((input, index) => {
      input.addEventListener("input", () => {
        if (input.value && index < 3) inputs[index + 1].focus();
      });
    });

    async function verify() {
      const email = localStorage.getItem("email");
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");

      errorEl.style.display = "none";
      successEl.style.display = "none";

      const code = inputs.map(i => i.value).join("");

      if (code.length !== 4) {
        errorEl.textContent = "4桁すべて入力してください。";
        errorEl.style.display = "block";
        return;
      }

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/verification_codes?email=eq.${email}`,
        {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          }
        }
      );

      const data = await res.json();

      if (!data[0] || data[0].code !== code) {
        errorEl.textContent = "コードが一致しません。";
        errorEl.style.display = "block";
        return;
      }

      successEl.style.display = "block";
    }
  </script>

</body>
</html>
