<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>4桁コード認証 - Step 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      text-align: center;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 13px; color: #9ca3af; margin: 0 0 16px; }
    .big-code {
      font-size: 36px;
      letter-spacing: 0.3em;
      margin: 12px 0 20px;
      font-weight: 700;
    }
    .code-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .code-row input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 24px;
      border-radius: 12px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
    }
    .code-row input:focus {
      outline: 2px solid #38bdf8;
      border-color: #38bdf8;
    }
    button {
      margin-top: 8px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .status { margin-top: 10px; font-size: 12px; color: #9ca3af; min-height: 16px; }
    .email-label { font-size: 12px; color: #9ca3af; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>4桁コード認証</h1>
    <p>この画面に表示されたコードを、下の入力欄にもう一度入力してください。</p>

    <div class="email-label" id="email-label"></div>

    <div class="big-code" id="shown-code">----</div>

    <div class="code-row">
      <input id="d1" maxlength="1" inputmode="numeric" />
      <input id="d2" maxlength="1" inputmode="numeric" />
      <input id="d3" maxlength="1" inputmode="numeric" />
      <input id="d4" maxlength="1" inputmode="numeric" />
    </div>

    <button id="verify">認証する</button>
    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "YOUR_SUPABASE_URL",
      "YOUR_SUPABASE_ANON_KEY"
    );

    const email = localStorage.getItem("email");
    const emailLabel = document.getElementById("email-label");
    const statusEl = document.getElementById("status");
    const verifyButton = document.getElementById("verify");
    const shownCodeEl = document.getElementById("shown-code");

    const inputs = [
      document.getElementById("d1"),
      document.getElementById("d2"),
      document.getElementById("d3"),
      document.getElementById("d4")
    ];

    if (email) {
      emailLabel.textContent = `メールアドレス: ${email}`;
    } else {
      emailLabel.textContent = "メールアドレス情報が見つかりません。最初からやり直してください。";
    }

    inputs.forEach((input, idx) => {
      input.addEventListener("input", () => {
        if (input.value && idx < inputs.length - 1) {
          inputs[idx + 1].focus();
        }
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && idx > 0) {
          inputs[idx - 1].focus();
        }
      });
    });

    let generatedCode = null;
    let currentUserId = null;

    async function waitForSession() {
      for (let i = 0; i < 20; i++) {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) return user;
        await new Promise(r => setTimeout(r, 100));
      }
      return null;
    }

    async function init() {
      statusEl.textContent = "セッション確認中…";

      const user = await waitForSession();

      if (!user) {
        statusEl.textContent = "セッションが見つかりません。リンクが無効かもしれません。";
        verifyButton.disabled = true;
        return;
      }

      currentUserId = user.id;

      generatedCode = Math.floor(1000 + Math.random() * 9000).toString();
      shownCodeEl.textContent = generatedCode.split("").join(" ");

      const { error: upsertError } = await supabase
        .from("profiles")
        .upsert({ id: currentUserId, otp_code: generatedCode });

      if (upsertError) {
        statusEl.textContent = "コードの保存に失敗しました。";
        verifyButton.disabled = true;
        return;
      }

      statusEl.textContent = "コードを確認して、下に入力してください。";
      inputs[0].focus();
    }

    verifyButton.onclick = async () => {
      if (!currentUserId) return;

      const inputCode = inputs.map(i => i.value.trim()).join("");
      if (inputCode.length !== 4) {
        statusEl.textContent = "4桁すべて入力してください。";
        return;
      }

      statusEl.textContent = "確認中…";
      verifyButton.disabled = true;

      const { data, error } = await supabase
        .from("profiles")
        .select("otp_code")
        .eq("id", currentUserId)
        .single();

      if (error || !data) {
        statusEl.textContent = "コードの確認に失敗しました。";
        verifyButton.disabled = false;
        return;
      }

      if (data.otp_code === inputCode) {
        statusEl.textContent = "認証成功！";
      } else {
        statusEl.textContent = "コードが違います。";
        verifyButton.disabled = false;
      }
    };

    init();
  </script>
</body>
</html>
