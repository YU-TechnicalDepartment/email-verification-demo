<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ログイン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    h1 { margin-bottom: 8px; }
    p { margin-bottom: 20px; color: #94a3b8; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e5e7eb;
      margin-bottom: 16px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }
    .status { margin-top: 12px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ログイン</h1>
    <p>Magic Link をメールで送信します</p>

    <input id="email" type="email" placeholder="you@example.com" />
    <button id="send">送信する</button>

    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://opttdyvobpfqfyrmrjhm.supabase.co",
      "sb_publishable_tdGdBXYKcAf0LMa0Httq0g_KDZqkvu0"
    );

    const emailInput = document.getElementById("email");
    const sendButton = document.getElementById("send");
    const statusEl = document.getElementById("status");

    // すでにログイン済みならメールアドレスを表示
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      emailInput.value = user.email;
      statusEl.textContent = `${user.email} としてログイン中`;
    }

    sendButton.onclick = async () => {
      const email = emailInput.value.trim();
      if (!email) {
        statusEl.textContent = "メールアドレスを入力してください。";
        return;
      }

      // ボタン連打防止
      sendButton.disabled = true;
      sendButton.style.opacity = "0.6";
      sendButton.style.cursor = "not-allowed";
      sendButton.textContent = "送信中…";

      statusEl.textContent = "送信中…";

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: "https://mail.3y.f5.si/dashboard.html"
        }
      });

      if (error) {
        statusEl.textContent = "送信に失敗しました。しばらくしてから再度お試しください。";
        sendButton.disabled = false;
        sendButton.style.opacity = "1";
        sendButton.style.cursor = "pointer";
        sendButton.textContent = "送信する";
        return;
      }

      // 緑のチェックマークに変化
      sendButton.innerHTML = "✔ 送信完了";
      sendButton.style.background = "#22c55e";
      sendButton.style.opacity = "1";

      statusEl.textContent = "メールを送信しました！受信ボックスを確認してください。";
    };
  </script>
</body>
</html>
