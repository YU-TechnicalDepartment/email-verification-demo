<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>メール認証デモ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #1d2440 0, #050816 45%, #020617 100%);
      font-family: system-ui, sans-serif;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 90%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.9);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.8);
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }
    button:hover {
      filter: brightness(1.1);
    }
    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>メール認証</h1>
    <p>メールアドレスを入力すると、4桁の認証コードが送信されます。</p>

    <input id="email" type="email" placeholder="you@example.com" required />

    <button onclick="sendCode()">認証コードを送信</button>

    <div id="error" class="error"></div>
  </div>

  <script>
    const SUPABASE_FUNCTION_URL = "https://YOUR-PROJECT.supabase.co/functions/v1/send-code";

    async function sendCode() {
      const email = document.getElementById("email").value;
      const errorEl = document.getElementById("error");

      errorEl.style.display = "none";

      if (!email) {
        errorEl.textContent = "メールアドレスを入力してください。";
        errorEl.style.display = "block";
        return;
      }

      try {
        await fetch(SUPABASE_FUNCTION_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        localStorage.setItem("email", email);
        window.location.href = "verify.html";
      } catch (e) {
        errorEl.textContent = "送信に失敗しました。設定を確認してください。";
        errorEl.style.display = "block";
      }
    }
  </script>

</body>
</html>
