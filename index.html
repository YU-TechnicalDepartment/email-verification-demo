<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>4桁コードログイン - Step 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }
    p {
      font-size: 13px;
      color: #9ca3af;
      margin: 0 0 16px;
    }
    label {
      font-size: 13px;
      display: block;
      margin-bottom: 6px;
    }
    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      box-sizing: border-box;
    }
    input[type="email"]:focus {
      outline: 2px solid #38bdf8;
      border-color: #38bdf8;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>メールでログイン</h1>
    <p>メールアドレスを入力すると、4桁の確認コードを送信します。</p>

    <label for="email">メールアドレス</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />

    <button id="send">コードを送信</button>
    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "YOUR_SUPABASE_URL",
      "YOUR_SUPABASE_ANON_KEY"
    );

    const emailInput = document.getElementById("email");
    const sendButton = document.getElementById("send");
    const statusEl = document.getElementById("status");

    sendButton.onclick = async () => {
      const email = emailInput.value.trim();
      if (!email) {
        statusEl.textContent = "メールアドレスを入力してください。";
        return;
      }

      sendButton.disabled = true;
      statusEl.textContent = "送信中…";

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          shouldCreateUser: true
        }
      });

      if (error) {
        console.error(error);
        statusEl.textContent = "送信に失敗しました。しばらくしてから再度お試しください。";
        sendButton.disabled = false;
      } else {
        localStorage.setItem("email", email);
        statusEl.textContent = "メールを送信しました。コードを確認してください。";
        // 少し待ってから遷移
        setTimeout(() => {
          window.location.href = "verify.html";
        }, 800);
      }
    };
  </script>
</body>
</html>
