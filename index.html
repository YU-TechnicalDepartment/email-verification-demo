<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ログイン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      border: 1px solid #334155;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>ログイン</h2>
    <p>メールアドレスを入力してください</p>

    <input id="email" type="email" placeholder="you@example.com" />
    <button id="send">Magic Link を送信</button>

    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://opttdyvobpfqfyrmrjhm.supabase.co",
      "sb_publishable_tdGdBXYKcAf0LMa0Httq0g_KDZqkvu0"
    );

    const emailInput = document.getElementById("email");
    const sendButton = document.getElementById("send");
    const statusEl = document.getElementById("status");

    sendButton.onclick = async () => {
      const email = emailInput.value.trim();
      if (!email) {
        statusEl.textContent = "メールアドレスを入力してください。";
        return;
      }

      statusEl.textContent = "送信中…";

      const { error } = await supabase.auth.signInWithOtp({
        email: email
      });

      if (error) {
        statusEl.textContent = "送信に失敗しました。しばらくしてから再度お試しください。";
        return;
      }

      statusEl.textContent = "メールを送信しました！受信ボックスを確認してください。";
    };
  </script>
</body>
</html>
