<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ダッシュボード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 40px;
    }
    .msg {
      margin-top: 12px;
      font-size: 14px;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <h1 id="title">現在処理中です…</h1>
  <p id="sub" style="color:#94a3b8; font-size:14px;">
    数分後にもう一度メールのボタンをクリックしてみてください。
  </p>

  <p id="success" class="msg"></p>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://opttdyvobpfqfyrmrjhm.supabase.co",
      "sb_publishable_tdGdBXYKcAf0LMa0Httq0g_KDZqkvu0"
    );

    function showSuccess(email) {
      document.getElementById("title").textContent =
        `${email} としてログイン中`;

      document.getElementById("sub").textContent = "";

      document.getElementById("success").textContent =
        "認証できました。メールアドレスを入力した画面に戻ってリロードを行い、操作を続けてください。";
    }

    // Magic Link のセッションが保存されるのを待つ
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        showSuccess(session.user.email);
      }
    });

    // すでにログイン済みなら即表示
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      showSuccess(user.email);
    }
  </script>
</body>
</html>
