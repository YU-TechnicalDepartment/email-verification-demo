<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ダッシュボード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 40px;
    }
  </style>
</head>
<body>
  <h1 id="title">読み込み中…</h1>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabase = createClient(
      "https://opttdyvobpfqfyrmrjhm.supabase.co",
      "sb_publishable_tdGdBXYKcAf0LMa0Httq0g_KDZqkvu0"
    );

    // ① Magic Link のセッションが保存されるのを待つ
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        document.getElementById("title").textContent =
          `${session.user.email} としてログイン中`;
      }
    });

    // ② すでにログイン済みなら即表示
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
      document.getElementById("title").textContent =
        `${user.email} としてログイン中`;
    }
  </script>
</body>
</html>
